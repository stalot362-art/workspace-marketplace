<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StartSpace Africa</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0f172a;
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: #020617;
    border-bottom: 1px solid #1e293b;
}

.logo {
    font-size: 22px;
    font-weight: bold;
    color: #22c55e;
}

.nav-links a {
    color: #cbd5f5;
    margin-left: 20px;
    text-decoration: none;
}

/* HERO */
.hero {
    padding: 50px 30px;
    text-align: center;
}

.hero h1 {
    font-size: 36px;
}

.hero p {
    color: #94a3b8;
}

.search-bar {
    margin-top: 20px;
}

.search-bar input {
    padding: 12px;
    width: 250px;
    border-radius: 6px;
    border: none;
    margin-right: 10px;
}

.search-bar button {
    padding: 12px 20px;
    background: #22c55e;
    border: none;
    border-radius: 6px;
    color: black;
    cursor: pointer;
}

/* LISTINGS */
.section {
    padding: 30px;
}

.section h2 {
    margin-bottom: 20px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.card {
    background: #020617;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #1e293b;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.03);
}

.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
}

.card-content {
    padding: 15px;
}

.price {
    color: #22c55e;
    font-weight: bold;
}

.location {
    font-size: 14px;
    color: #94a3b8;
}

.button {
    margin-top: 10px;
    display: inline-block;
    padding: 8px 12px;
    background: #22c55e;
    color: black;
    border-radius: 5px;
    text-decoration: none;
}

/* POST SPACE */
.post-section {
    padding: 30px;
    background: #020617;
    margin-top: 30px;
}

.post-section input,
.post-section textarea {
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
    border-radius: 5px;
    border: none;
}

.post-section button {
    padding: 12px;
    width: 100%;
    background: #22c55e;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 20px;
    margin-top: 30px;
    border-top: 1px solid #1e293b;
    color: #94a3b8;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">StartSpace</div>
    <div class="nav-links">
        <a href="#">Browse</a>
        <a href="#">Post Space</a>
        <a href="#">Login</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Affordable Workspaces for Startups</h1>
    <p>Find rooms, desks, and offices across Lagos</p>

    <div class="search-bar">
        <input type="text" placeholder="Enter location (e.g. Yaba)">
        <button>Search</button>
    </div>
</div>

<!-- LISTINGS -->
<div class="section">
    <h2>Available Spaces</h2>

    <div class="grid">

        <div class="card">
            <img src="https://via.placeholder.com/300x150">
            <div class="card-content">
                <div class="price">₦50,000/month</div>
                <div class="location">Yaba, Lagos</div>
                <a href="#" class="button">View Space</a>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x150">
            <div class="card-content">
                <div class="price">₦35,000/month</div>
                <div class="location">Lekki Phase 1</div>
                <a href="#" class="button">View Space</a>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/300x150">
            <div class="card-content">
                <div class="price">₦25,000/month</div>
                <div class="location">Ikeja</div>
                <a href="#" class="button">View Space</a>
            </div>
        </div>

    </div>
</div>

<!-- POST SPACE -->
<div class="post-section">
    <h2>List Your Space</h2>

    <input type="text" placeholder="Space Title">
    <input type="text" placeholder="Location">
